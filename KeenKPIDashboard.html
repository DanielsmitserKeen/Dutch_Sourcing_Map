<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B SaaS Benchmarks 2024 – Consulting Style</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body { background-color: #f9fafb; font-family: "Inter", sans-serif; }
    .section-block { display: flex; align-items: center; justify-content: space-between; gap: 3rem; padding: 6rem 2rem; }
    .section-alt { background-color: #f3f4f6; }
    .text-block { max-width: 550px; }
    .text-block h2 { font-size: 2rem; font-weight: 800; color: #111827; margin-bottom: 1rem; }
    .text-block p { font-size: 1.1rem; color: #374151; line-height: 1.6; }
    table { border-collapse: collapse; width: 100%; min-width: 550px; background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    th, td { border: 1px solid #e5e7eb; padding: 0.75rem 1.25rem; text-align: left; font-size: 1rem; }
    th { background: #f9fafb; font-weight: 700; color: #111827; }
    td { color: #1f2937; }
    td.negative { color: #dc2626; font-weight: 600; }
    td.blue { color: #2563eb; font-weight: 600; }
  </style>
</head>

<body>
  <header class="text-center py-12">
    <h1 class="text-5xl font-extrabold text-gray-900">📊 B2B SaaS Benchmarks 2024</h1>
    <p class="text-gray-600 mt-4 text-lg">Automatically pulled from Google Sheets — Growth, Gross Margin, and Rule of 40.</p>
    <div id="status" class="text-gray-500 mt-4 text-sm">Loading data...</div>
  </header>

  <main id="content" class="space-y-12"></main>

  <script>
  (() => {
    const SHEETS = {
      "Growth 2024":
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRmwEvh_eGepTHxxJUBhxLSFVFzKMxd0WRgX9YKRwTg8d9ifV3C_-IaDYH1cnBji4s6hS5cH80WfzX/pub?gid=2027488571&single=true&output=csv",
      "Gross Margin 2024":
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRmwEvh_eGepTHxxJUBhxLSFVFzKMxd0WRgX9YKRwTg8d9ifV3C_-IaDYH1cnBji4s6hS5cH80WfzX/pub?gid=1135790165&single=true&output=csv",
      "Rule of 40 2024":
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRmwEvh_eGepTHxxJUBhxLSFVFzKMxd0WRgX9YKRwTg8d9ifV3C_-IaDYH1cnBji4s6hS5cH80WfzX/pub?gid=996726301&single=true&output=csv",
    };

    const parsePercent = str => {
      if (!str) return null;
      const num = parseFloat(String(str).replace(/[%\s]/g, "").replace(",", "."));
      return isNaN(num) ? null : num;
    };

    function extractTableData(rows) {
      const headerRow = rows.find(r =>
        r.join("").toLowerCase().includes("25") &&
        r.join("").toLowerCase().includes("median") &&
        r.join("").toLowerCase().includes("75")
      );
      const findIndex = (keys) => headerRow.findIndex(c => keys.some(k => c.toLowerCase().includes(k)));
      const idxRange = 0, idx25 = findIndex(["25"]), idx50 = findIndex(["50"]), idx75 = findIndex(["75"]),
            idxAvg = findIndex(["average"]), idxFund = findIndex(["fund"]);

      const labels=[], p25=[], med=[], p75=[], avg=[], fund=[];
      const normalize = t => t.replace(/[–—−]/g,"-").replace(/\s+/g,"").toUpperCase();

      for(const r of rows){
        if(!r||!r.length) continue;
        const label=(r[idxRange]||"").trim(), norm=normalize(label);
        if(!norm.match(/[0-9].*M/i)&&!norm.startsWith("<")&&!norm.startsWith(">")) continue;
        labels.push(label);
        p25.push(parsePercent(r[idx25])); med.push(parsePercent(r[idx50]));
        p75.push(parsePercent(r[idx75])); avg.push(parsePercent(r[idxAvg]));
        fund.push(parsePercent(r[idxFund]));
      }
      return {labels,p25,med,p75,avg,fund};
    }

    function makeTable(data){
      const {labels,p25,med,p75,avg,fund}=data;
      return `
      <table>
        <thead>
          <tr>
            <th>ARR Range</th><th>25th %</th><th>Median</th><th>75th %</th><th>Average ≈</th><th>Fund I & II Avg</th>
          </tr>
        </thead>
        <tbody>
          ${labels.map((l,i)=>`
          <tr class="${i%2?"bg-gray-50":""}">
            <td>${l}</td>
            <td class="${p25[i]<0?"negative":""}">${p25[i]??""}%</td>
            <td class="${med[i]<0?"negative":""}">${med[i]??""}%</td>
            <td class="${p75[i]<0?"negative":""}">${p75[i]??""}%</td>
            <td class="${avg[i]<0?"negative":""}">${avg[i]??""}%</td>
            <td class="${fund[i]<0?"negative blue":"blue"}">${fund[i]??""}%</td>
          </tr>`).join("")}
        </tbody>
      </table>`;
    }

    const SECTIONS = [
      {
        name: "Growth 2024",
        title: "Your Business Growth",
        text: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut sed neque eget enim elementum imperdiet. Cras faucibus lorem sit amet lorem sollicitudin porta. Integer porttitor tellus nec malesuada posuere.",
        layout: "text-left",
      },
      {
        name: "Gross Margin 2024",
        title: "Gross Margin",
        text: "Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae; Donec interdum, eros sed gravida ultricies, urna leo bibendum libero, vitae gravida orci risus vel turpis.",
        layout: "text-right",
      },
      {
        name: "Rule of 40 2024",
        title: "Monitor Profitability with the Rule of 40 Metric",
        text: "Fusce aliquet, libero ac sollicitudin imperdiet, nisi ligula pharetra orci, a luctus urna ipsum nec velit. Mauris euismod lacus nec fermentum lacinia. Integer a lacus non lorem bibendum faucibus.",
        layout: "text-left",
      },
    ];

    let loaded = 0;
    SECTIONS.forEach((sec, i)=>{
      Papa.parse(SHEETS[sec.name],{
        download:true,skipEmptyLines:false,
        complete:res=>{
          const data=extractTableData(res.data);
          const table=makeTable(data);
          const html=`
          <section class="section-block ${i%2?"section-alt":""} ${sec.layout==='text-left'?'flex-row':'flex-row-reverse'}">
            <div class="text-block">
              <h2>${sec.title}</h2>
              <p>${sec.text}</p>
            </div>
            <div class="table-block flex-1">${table}</div>
          </section>`;
          document.getElementById("content").insertAdjacentHTML("beforeend",html);
          document.getElementById("status").textContent=`✅ Loaded ${++loaded}/${SECTIONS.length} sections successfully.`;
        },
        error:err=>document.getElementById("status").textContent=`⚠️ Failed: ${err.message}`
      });
    });
  })();
  </script>
</body>
</html>
